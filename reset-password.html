<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <!-- 보안 (Codex 검증 2026-06-12): 토큰 referrer 유출 방지 + 인덱싱 차단 + CSP.
       GitHub Pages는 응답 헤더 제어 불가라 meta로 적용(X-Frame-Options/HSTS는 meta 불가 — 호스트 이전 시 보강). -->
  <meta name="referrer" content="no-referrer" />
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://sightecho-api-666540742078.us-central1.run.app; img-src 'self' data:; base-uri 'none'; form-action 'none'" />
  <title>비밀번호 재설정 — SightEcho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0D1B2A;
      color: #E2E8F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #162032;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      font-family: 'Young Serif', serif;
      width: 56px;
      height: 56px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    h1 { font-family: 'Young Serif', serif; font-size: 20px; margin-bottom: 8px; }
    .desc { font-size: 14px; color: #94A3B8; line-height: 1.5; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #94A3B8; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #1E2F42;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      color: #E2E8F0;
      outline: none;
      margin-bottom: 4px;
    }
    input:focus { border-color: #E8703A; }
    input.error { border-color: #FC8181; }
    .field-error { font-size: 12px; color: #FC8181; margin-bottom: 12px; }
    .field-wrap { margin-bottom: 16px; }
    button {
      width: 100%;
      background: #E8703A;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .banner {
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      line-height: 1.5;
    }
    .error-banner { background: rgba(252,129,129,0.12); border: 1px solid rgba(252,129,129,0.30); color: #FC8181; }
    .success-banner { background: rgba(72,199,142,0.12); border: 1px solid rgba(72,199,142,0.30); color: #48C78E; }
    .back { display: block; text-align: center; margin-top: 20px; color: #94A3B8; font-size: 13px; text-decoration: none; }
    .back:hover { color: #E2E8F0; }
    #success { display: none; text-align: center; }
    #success .icon { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="card">
  <!-- icon.png(404) 제거 — 불필요한 요청/referrer 노출 방지 (Codex #2/#3) -->

  <!-- Form state -->
  <div id="form-view">
    <h1>비밀번호 재설정</h1>
    <p class="desc">새 비밀번호를 입력해 주세요.</p>

    <div id="banner" class="banner" style="display:none"></div>

    <div class="field-wrap">
      <label for="pw">새 비밀번호</label>
      <input type="password" id="pw" placeholder="8자 이상" autocomplete="new-password" />
      <div class="field-error" id="pw-err"></div>
    </div>
    <div class="field-wrap">
      <label for="pw2">비밀번호 확인</label>
      <input type="password" id="pw2" placeholder="비밀번호 재입력" autocomplete="new-password" />
      <div class="field-error" id="pw2-err"></div>
    </div>

    <button id="submit-btn" onclick="handleSubmit()">비밀번호 변경하기</button>
    <a class="back" href="https://sightechoai.com">← SightEcho 홈</a>
  </div>

  <!-- Success state -->
  <div id="success">
    <div class="icon">✅</div>
    <h1>비밀번호가 변경되었습니다</h1>
    <p class="desc" style="margin-top:8px">앱에서 새 비밀번호로 로그인해 주세요.</p>
    <a class="back" href="https://sightechoai.com">← SightEcho 홈</a>
  </div>
</div>

<script>
  const API_BASE = 'https://sightecho-api-666540742078.us-central1.run.app/api';

  // 토큰은 fragment(#token=) 우선 — 서버 로그/referrer에 안 남음. query(?token=)는
  // 기존 발송 메일 호환 fallback. 읽은 즉시 URL에서 제거(공유/뒤로가기/referrer 노출 차단).
  const TOKEN = (function () {
    let t = '';
    if (window.location.hash) {
      t = new URLSearchParams(window.location.hash.replace(/^#/, '')).get('token') || '';
    }
    if (!t) {
      t = new URLSearchParams(window.location.search).get('token') || '';
    }
    if (t && window.history.replaceState) {
      window.history.replaceState(null, '', window.location.pathname);
    }
    return t;
  })();

  function getToken() {
    return TOKEN;
  }

  function showBanner(msg, type) {
    const el = document.getElementById('banner');
    el.textContent = msg;
    el.className = 'banner ' + (type === 'error' ? 'error-banner' : 'success-banner');
    el.style.display = 'block';
  }

  async function handleSubmit() {
    const token = getToken();
    const pw = document.getElementById('pw').value;
    const pw2 = document.getElementById('pw2').value;
    const btn = document.getElementById('submit-btn');

    // Clear errors
    document.getElementById('pw-err').textContent = '';
    document.getElementById('pw2-err').textContent = '';
    document.getElementById('pw').classList.remove('error');
    document.getElementById('pw2').classList.remove('error');
    document.getElementById('banner').style.display = 'none';

    // Validate
    let valid = true;
    if (pw.length < 8) {
      document.getElementById('pw-err').textContent = '비밀번호는 8자 이상이어야 합니다.';
      document.getElementById('pw').classList.add('error');
      valid = false;
    }
    if (!pw2) {
      document.getElementById('pw2-err').textContent = '비밀번호를 다시 입력해 주세요.';
      document.getElementById('pw2').classList.add('error');
      valid = false;
    } else if (pw !== pw2) {
      document.getElementById('pw2-err').textContent = '비밀번호가 일치하지 않습니다.';
      document.getElementById('pw2').classList.add('error');
      valid = false;
    }
    if (!token) {
      showBanner('유효하지 않은 링크입니다. 이메일의 링크를 다시 확인해 주세요.', 'error');
      return;
    }
    if (!valid) return;

    btn.disabled = true;
    btn.textContent = '변경 중...';

    try {
      const res = await fetch(`${API_BASE}/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: pw }),
      });

      if (res.status === 204) {
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } else {
        const body = await res.json().catch(() => ({}));
        const msg = body?.message || '링크가 유효하지 않거나 만료되었습니다. 비밀번호 찾기를 다시 시도해 주세요.';
        showBanner(msg, 'error');
        btn.disabled = false;
        btn.textContent = '비밀번호 변경하기';
      }
    } catch {
      showBanner('네트워크 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.', 'error');
      btn.disabled = false;
      btn.textContent = '비밀번호 변경하기';
    }
  }

  // Show error if no token in URL
  if (!getToken()) {
    document.addEventListener('DOMContentLoaded', () => {
      showBanner('유효하지 않은 링크입니다. 앱에서 비밀번호 찾기를 다시 시도해 주세요.', 'error');
    });
  }
</script>
</body>
</html>
